<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
    </header>

    <form action="">
        <label for="tarefa">Adicionar tarefa: </label>
        <input type="text" id="tarefa" name="tarefa">
        <button type="button" onclick="adicioarTarefa()">Adicionar Tarefa</button>
    </form>

    <ul id="Lista de Tarefas">

    </ul>

    <script>
        function adicioarTarefa(){
            let campoTarefa = document.getElementById('tarefa');
            let listaDeTarefas = document.getElementById('lista-de-tarefas');
            let novaTarefa = document.createElement('li');
            novaTarefa.textContent = campoTarefa.value;
            listaDeTarefas.appendChild(novaTarefa);
            campoTarefa.value = '';
        }
    </script>
</body>
</html>
